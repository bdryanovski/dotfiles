set -g default-terminal "${TERM}"
set -ga terminal-overrides ",*:RGB"


# remap prefix from C-b to C-f
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-hjkl to move
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Display
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# don't reanme windows automatically
set-option -g allow-rename off

# faster command sequence
setw -g xterm-keys on
set -s escape-time 0
set -sg repeat-time 1000
set -s focus-events on
set -g mouse on
set -g set-clipboard on

unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind s split-window -h -c "#{pane_current_path}"

bind f resize-pane -Z

# reload config file (change file location to your the tmux.conf you want to use)
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded! Boom"

# Maping

# New windows and panes inherit current path
bind c new-window -c "#{pane_current_path}"
bind b previous-window

bind C-y display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"

bind C-n display-popup -E 'bash -i -c "read -p \"New session name: \" name; tmux new-session -d -s \$name && tmux switch -client -t \$name"'
bind Space display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '##S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind C-f display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "spf"
bind C-o choose-tree

# Vim mode
set-window-option -g mode-keys vi

set -g default-command "reattach-to-user-namespace -l zsh"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

setw -g mode-style 'fg=black bg=magenta bold'

# UTF8
setw -q -g utf8 on

# History
set -g history-limit 10000
set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000

set -g status-interval 10 # every 10 seconds redraw the status line

### Theme
set -g status-style bg=default,fg=black,bright
set -g status-left ""
set -g status-right "#[fg=white,bright,bg=magenta] #S "
set -g status-position top
set -g window-status-format " #I "
set -g window-status-current-format " #W "
set -g window-status-bell-style "fg=red,nobold"
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta\#,nobold}"
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

set -g message-style 'fg=white bg=magenta,bold'

set -g clock-mode-colour magenta

## Ignore bell
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none



# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.config/tmux/plugins/tpm/tpm'
